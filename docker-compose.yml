services:
  nats:
    image: nats:latest
    container_name: nats
    command: [ "-js" ]
    ports:
      - "4222:4222" # client port
      - "8222:8222" # http-monitoring

  metrics-service:
    build:
      context: .
      dockerfile: metrics-service/Dockerfile
    container_name: metrics-service
    depends_on:
      - nats
    environment:
      - METRICS_SERVICE_PORT=8081
      - GRPC_PORT=50051
      - NATS_URL=nats://nats:4222 # inside of docker network
    ports:
      - "8081:8081"
      - "50051:50051"

  metrics-feeder:
    build:
      context: .
      dockerfile: metrics-feeder/Dockerfile
    container_name: metrics-feeder
    command: ["-target", "metrics-service:50051"]
    depends_on:
      - metrics-service

  pattern-service:
    build: ./pattern-service
    container_name: pattern-service
    depends_on:
      - nats
    environment:
      - HTTP_PORT=8082
      - NATS_URL=nats://nats:4222
    ports:
      - "8082:8082"

  read-service:
    build: ./read-service
    container_name: read-service
    environment:
      HTTP_ADDR: ":8080"
      NATS_URL: "nats://nats:4222"
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/read?sslmode=disable"
      ANOMALIES_STREAM: "ANOMALIES"
      ANOMALIES_SUBJECT: "anomaly.detected"
      DURABLE_NAME: "read-service-anomalies-consumer"
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_started
      pattern-service:
        condition: service_started
      db-migration:
        condition: service_completed_successfully

  db-migration:
    build: ./read-service/db
    container_name: db-migration
    volumes:
      - ./read-service/db/migrations:/migrations
    command: ["-dir", "/migrations", "postgres", "postgres://postgres:postgres@postgres:5432/read?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: read
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d read"]
      interval: 3s
      timeout: 3s
      retries: 5
